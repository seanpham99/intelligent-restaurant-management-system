x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-file: 3
      max-size: "10m"

x-limits: &limits
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: "4g"

x-db-envs: &db-envs
  DB_HOST: irms-db
  DB_PORT: 5432
  DB_USER: postgres
  DB_PASSWORD: ${DB_PASSWORD}
  DB_NAME: postgres

x-tz: &tz
  TZ: Asia/Ho_Chi_Minh

services:
  db:
    image: postgres:16-alpine
    container_name: irms-db
    environment:
      <<: *tz
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - api-internal
    <<: [ *logging, *limits ]

  gateway:
    image: local/irms-api-gateway
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway
    container_name: irms-api-gateway
    environment:
      <<: [ *tz, *db-envs ]
    ports:
      - 8000:8000
    networks:
      - api-internal
    <<: [ *logging, *limits ]
  
  menu-service:
    image: local/irms-menu-service
    build:
      context: .
      dockerfile: Dockerfile
      target: menu-runner
    container_name: irms-menu-service
    # volumes:
    #   - ./menu-service/app:/app
    #   - ./shares:/app/shares
    environment:
      <<: [*tz, *db-envs]
    ports:
      - 8001:8000
    <<: [ *logging, *limits ]

  pgadmin:
    image: dpage/pgadmin4:8.4
    container_name: irms-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_CHECK_FOR_UPDATES: 'False'
      PGADMIN_CONFIG_MAX_LOGIN_ATTEMPTS: 10
      PGADMIN_CONFIG_LOGIN_LOCKOUT_DURATION: 1
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./data/pgadmin:/var/lib/pgadmin
    ports:
      - 8080:80
    networks:
      - api-internal
    <<: [ *logging, *limits ]


networks:
  api-internal:
    name: api-internal
