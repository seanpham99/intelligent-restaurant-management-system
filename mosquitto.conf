# Mosquitto configuration
# ─────────────────────────────────────────────────────────────────────────────
# Bind to all interfaces so other Docker containers on the same bridge
# network can reach the broker.  External exposure is controlled by the
# docker-compose.yml port mappings (port 1883 is NOT published externally).
#
# WARNING: For staging/production you MUST:
#   1. Set allow_anonymous false
#   2. Configure a password_file (mosquitto_passwd) and per-client ACLs
#   3. Enable TLS with a valid certificate
# ─────────────────────────────────────────────────────────────────────────────

listener 1883 0.0.0.0
allow_anonymous true
