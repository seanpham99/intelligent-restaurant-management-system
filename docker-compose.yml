version: "3.9"

services:
  backend:
    build: ./backend
    container_name: irms-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - MQTT_BROKER_HOST=mqtt
      - MQTT_BROKER_PORT=1883
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
    depends_on:
      - redis
      - mqtt
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: irms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: irms-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:2
    container_name: irms-mqtt
    # Port 1883 is intentionally NOT published to the host – the broker is
    # only reachable from other containers on the same Docker bridge network.
    # To test locally outside Docker, uncomment the line below, and ensure
    # you have proper authentication configured in mosquitto.conf first.
    # ports:
    #   - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

volumes:
  redis_data:
